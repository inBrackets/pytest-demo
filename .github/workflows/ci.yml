name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: write   # required for peaceiris/actions-gh-pages to push to gh-pages

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run tests
        env:
          AE_USERNAME: ${{ secrets.AE_USERNAME }}
          AE_PASSWORD: ${{ secrets.AE_PASSWORD }}
          BROWSER_HEADLESS: "true"
        run: uv run pytest --tb=short -q

      # Fetch the existing gh-pages branch to restore Allure history.
      # continue-on-error: first run has no gh-pages branch yet.
      - name: Fetch Allure history from gh-pages
        if: always()
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Restore history into allure-results
        if: always()
        run: |
          mkdir -p output/allure-results/history
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history/. output/allure-results/history/
          fi

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure HTML report
        if: always()
        run: allure generate output/allure-results --output output/allure-report --clean

      # Stage all gh-pages content in one directory so a single deploy commit
      # is made — avoids race conditions from multiple sequential force-pushes.
      - name: Stage GitHub Pages content
        if: always()
        run: |
          mkdir -p /tmp/gh-pages/${{ github.run_number }}
          cp -r output/allure-report/. /tmp/gh-pages/${{ github.run_number }}/

          # Shared /history/ so the next run can restore trend data without
          # knowing the previous run number.
          mkdir -p /tmp/gh-pages/history
          if [ -d output/allure-report/history ]; then
            cp -r output/allure-report/history/. /tmp/gh-pages/history/
          fi

          # Root redirect — always points to the latest run.
          cat > /tmp/gh-pages/index.html << EOF
          <!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0;url=${{ github.run_number }}/index.html">
              <title>Redirecting to latest report…</title>
            </head>
            <body>Redirecting to <a href="${{ github.run_number }}/index.html">run ${{ github.run_number }}</a>…</body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/gh-pages
          keep_files: true   # preserve reports from previous runs

      - name: Print report URL
        if: always()
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.run_number }}/"
          echo "### Allure report" >> $GITHUB_STEP_SUMMARY
          echo "$REPORT_URL" >> $GITHUB_STEP_SUMMARY
